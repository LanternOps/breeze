# Settings Admin E2E Tests
# Tests the full settings area: overview, organization, users, roles, API keys,
# enrollment keys, SSO, sites, custom fields, saved filters, profile, AI usage,
# and access reviews.
# Does NOT perform destructive mutations — modals are opened and cancelled.

tests:
  - id: settings_overview_page_loads
    name: "Settings Overview Page Loads"
    description: "Verify the /settings hub shows card links for Organizations, Users, and Sites"
    tags: [settings, critical]
    nodes: [linux]
    timeout: 60000
    steps:
      - id: login
        action: ui
        description: "Login to Breeze dashboard"
        playwright:
          - goto: "/login"
          - fill:
              "[name='email']": "${TEST_USER_EMAIL}"
              "[name='password']": "${TEST_USER_PASSWORD}"
          - click: "button[type='submit']"
          - waitFor:
              url: "**/"
              timeout: 15000

      - id: navigate_settings
        action: ui
        description: "Navigate to /settings"
        playwright:
          - goto: "/settings"
          - waitFor: "h1:has-text('Settings')"
            timeout: 15000

      - id: verify_settings_cards
        action: ui
        description: "Verify hub cards for Organizations, Users, and Sites"
        playwright:
          - waitFor: "text=Organizations"
            timeout: 10000
          - waitFor: "text=Users"
            timeout: 5000
          - waitFor: "text=Sites"
            timeout: 5000
          - waitFor: "text=Manage your organization settings"
            timeout: 5000

  - id: settings_users_management
    name: "User Management Page"
    description: "List users, search by name/email, and open the Invite User modal"
    tags: [settings, users, critical]
    nodes: [linux]
    timeout: 120000
    steps:
      - id: login
        action: ui
        description: "Login to Breeze dashboard"
        playwright:
          - goto: "/login"
          - fill:
              "[name='email']": "${TEST_USER_EMAIL}"
              "[name='password']": "${TEST_USER_PASSWORD}"
          - click: "button[type='submit']"
          - waitFor:
              url: "**/"
              timeout: 15000

      - id: navigate_users
        action: ui
        description: "Navigate to /settings/users"
        playwright:
          - goto: "/settings/users"
          - waitFor: "h1:has-text('Users')"
            timeout: 15000

      - id: verify_user_table
        action: ui
        description: "Verify table columns: Name, Email, Role, Status, Last login, Actions"
        playwright:
          - waitFor: "text=Name"
            timeout: 10000
          - waitFor: "text=Email"
            timeout: 5000
          - waitFor: "text=Role"
            timeout: 5000
          - waitFor: "text=Status"
            timeout: 5000
          - waitFor: "text=Last login"
            timeout: 5000

      - id: verify_invite_button
        action: ui
        description: "Verify the Invite user button is present"
        playwright:
          - waitFor: "button:has-text('Invite user')"
            timeout: 10000

      - id: search_users
        action: ui
        description: "Type into the user search field"
        playwright:
          - fill:
              "#user-search": "admin"
          - waitFor: "text=of"
            timeout: 5000

      - id: open_invite_modal
        action: ui
        description: "Click Invite user to open the invite modal"
        playwright:
          - fill:
              "#user-search": ""
          - click: "button:has-text('Invite user')"
          - waitFor: "text=Invite User"
            timeout: 10000

      - id: cancel_invite_modal
        action: ui
        description: "Cancel the invite modal"
        optional: true
        playwright:
          - click: "button:has-text('Cancel')"

      - id: verify_api_users
        action: api
        description: "Verify users API returns data"
        request:
          method: GET
          path: "/api/v1/users"
        assert:
          status: 200
        expect: {}

