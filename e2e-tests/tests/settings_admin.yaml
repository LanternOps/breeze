      - id: verify_api_keys_controls
        action: ui
        description: "Verify the Create Key button and search/filter controls"
        playwright:
          - waitFor: "button:has-text('Create Key')"
            timeout: 10000
          - waitFor: "input[placeholder*='Search by name']"
            timeout: 5000

      - id: verify_api_keys_table_headers
        action: ui
        description: "Verify table has Name, Key Prefix, Scopes, Created, Last Used, Status columns"
        playwright:
          - waitFor: "text=Name"
            timeout: 5000
          - waitFor: "text=Key Prefix"
            timeout: 5000
          - waitFor: "text=Scopes"
            timeout: 5000
          - waitFor: "th:has-text('Status')"
            timeout: 5000

      - id: open_create_key_modal
        action: ui
        description: "Click Create Key to open the API key form"
        playwright:
          - click: "button:has-text('Create Key')"
          - waitFor: "text=Create API Key"
            timeout: 10000

      - id: cancel_create_key_modal
        action: ui
        description: "Cancel to close the modal"
        optional: true
        playwright:
          - click: "button:has-text('Cancel')"

      - id: verify_api_keys_api
        action: api
        description: "Verify API keys endpoint returns expected structure"
        request:
          method: GET
          path: "/api/v1/api-keys"
        assert:
          status: 200
        expect:
          pagination: {}

