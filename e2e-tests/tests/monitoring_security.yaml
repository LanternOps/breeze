              contains: "Endpoint protection status across all devices"
          - assert:
              selector: "div"
              contains: "Total Devices"
          - assert:
              selector: "div"
              contains: "Protected"
          - assert:
              selector: "div"
              contains: "Unprotected"
          - assert:
              selector: "div"
              contains: "Coverage"

      - id: verify_filter_controls
        action: ui
        description: "Verify search input and status/OS filter dropdowns are present"
        playwright:
          - assert:
              selector: "input[type='search'][placeholder='Search devices...']"
              visible: true
          - assert:
              selector: "select option[value='protected']"
              visible: true
          - assert:
              selector: "select option[value='at_risk']"
              visible: true
          - assert:
              selector: "select option[value='unprotected']"
              visible: true
          - assert:
              selector: "select option[value='offline']"
              visible: true

      - id: verify_device_table
        action: ui
        description: "Verify device table has Device, OS, Provider, Status, Real-time columns"
        playwright:
          - assert:
              selector: "table thead"
              contains: "Device"
          - assert:
              selector: "table thead"
              contains: "OS"
          - assert:
              selector: "table thead"
              contains: "Provider"
          - assert:
              selector: "table thead"
              contains: "Status"
          - assert:
              selector: "table thead"
              contains: "Real-time"

      - id: filter_by_status
        action: ui
        description: "Filter devices by Protected status"
        playwright:
          - selectOption:
              "select:has(option[value='protected'])": "protected"
          - waitFor:
              selector: "table tbody"
              timeout: 5000

