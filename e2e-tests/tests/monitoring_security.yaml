# Monitoring & Security Dashboard E2E Tests
# Tests security posture dashboard, all security sub-pages, monitoring, peripheral control,
# sensitive data discovery, and audit log verification.
# Verification uses API log queries instead of remote MCP calls.

tests:
  - id: security_dashboard_overview
    name: "Security Posture Dashboard Overview"
    description: "Verify security dashboard loads with all stat cards and navigation links"
    tags: [security, dashboard, critical]
    nodes: [linux]
    timeout: 120000
    steps:
      - id: login
        action: ui
        description: "Login to Breeze dashboard"
        playwright:
          - goto: "/login"
          - fill:
              "[name='email']": "${TEST_USER_EMAIL}"
              "[name='password']": "${TEST_USER_PASSWORD}"
          - click: "button[type='submit']"
          - waitFor:
              url: "**/"
              timeout: 15000

      - id: navigate_security
        action: ui
        description: "Navigate to Security dashboard"
        playwright:
          - goto: "/security"
          - waitFor: "h2:has-text('Security')"
            timeout: 15000

      - id: verify_page_heading
        action: ui
        description: "Verify main heading and subtext are visible"
        playwright:
          - assert:
              selector: "h2"
              contains: "Security"
          - assert:
              selector: "p"
              contains: "Track protection coverage"

      - id: verify_refresh_button
        action: ui
        description: "Verify Refresh button is present and functional"
        playwright:
          - assert:
              selector: "button"
              contains: "Refresh"
          - click: "button:has-text('Refresh')"

      - id: verify_security_score_card
        action: ui
        description: "Verify Security Score card with score and View details link"
        playwright:
          - assert:
              selector: "p"
              contains: "Security Score"
          - assert:
              selector: "p"
              contains: "/ 100"
          - assert:
              selector: "a[href='/security/score']"
              contains: "View details"

      - id: verify_trend_chart_card
        action: ui
        description: "Verify Security Score Trend card is present"
        playwright:
          - assert:
              selector: "p"
              contains: "Security Score Trend"
          - assert:
              selector: "a[href='/security/trends']"
              contains: "View details"

      - id: verify_vulnerabilities_card
        action: ui
        description: "Verify Vulnerabilities card shows severity breakdown"
        playwright:
          - assert:
              selector: "p"
              contains: "Vulnerabilities"
          - assert:
              selector: "span, div"
              contains: "Critical"
          - assert:
              selector: "span, div"
              contains: "High"
          - assert:
              selector: "a[href='/security/vulnerabilities']"
              contains: "View details"

      - id: verify_antivirus_card
        action: ui
        description: "Verify Antivirus Coverage card shows protected/unprotected counts"
        playwright:
          - assert:
              selector: "p"
              contains: "Antivirus Coverage"
          - assert:
              selector: "span"
              contains: "Protected"
          - assert:
              selector: "span"
              contains: "Unprotected"
          - assert:
              selector: "a[href='/security/antivirus']"
              contains: "View details"

      - id: verify_firewall_card
        action: ui
        description: "Verify Firewall Status card shows enabled/disabled counts"
        playwright:
          - assert:
              selector: "p"
              contains: "Firewall Status"
          - assert:
              selector: "span"
              contains: "Enabled"
          - assert:
              selector: "span"
              contains: "Disabled"
          - assert:
              selector: "a[href='/security/firewall']"
              contains: "View details"

      - id: verify_encryption_card
        action: ui
        description: "Verify Encryption Status card shows BitLocker and FileVault counts"
        playwright:
          - assert:
              selector: "p"
              contains: "Encryption Status"
          - assert:
              selector: "span"
              contains: "BitLocker enabled"
          - assert:
              selector: "span"
              contains: "FileVault enabled"
          - assert:
              selector: "a[href='/security/encryption']"
              contains: "View details"

      - id: verify_password_card
        action: ui
        description: "Verify Password Policy card shows compliance percentage"
        playwright:
          - assert:
              selector: "p"
              contains: "Password Policy"
          - assert:
              selector: "span"
              contains: "compliant"
          - assert:
              selector: "a[href='/security/password-policy']"
              contains: "View details"

      - id: verify_admin_audit_card
        action: ui
        description: "Verify Admin Account Audit card shows default and weak admin counts"
        playwright:
          - assert:
              selector: "p"
              contains: "Admin Account Audit"
          - assert:
              selector: "p"
              contains: "Default admins"
          - assert:
              selector: "p"
              contains: "Weak admins"
          - assert:
              selector: "a[href='/security/admin-audit']"
              contains: "View details"

      - id: verify_recommendations_card
        action: ui
        description: "Verify Security Recommendations section is present with remediation guidance link"
        playwright:
          - assert:
              selector: "p"
              contains: "Security Recommendations"
          - assert:
              selector: "a[href='/security/recommendations']"
              contains: "View details"

      - id: verify_via_api
        action: api
        description: "Verify security posture data collected by agent"
        request:
          method: GET
          path: "/api/v1/devices/{{devices.linux}}/diagnostic-logs"
          query:
            component: security
            since: "{{testStartTime}}"
        poll:
          maxAttempts: 10
          intervalMs: 3000
          until: "logs.length > 0"
        expect:
          offset: 0

