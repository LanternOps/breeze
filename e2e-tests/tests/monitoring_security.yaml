            timeout: 15000

      - id: verify_header_and_stat_cards
        action: ui
        description: "Verify page header and four stat cards (Total, Protected, Unprotected, Coverage)"
        playwright:
          - assert:
              selector: "h2"
              contains: "Antivirus Coverage"
          - assert:
