        description: "Verify all 6 stat cards: Total Devices, With Issues, Total Admins, Default Accts, Weak Passwords, Stale Accts"
        playwright:
          - assert:
              selector: "div"
              contains: "Total Devices"
          - assert:
              selector: "div"
              contains: "With Issues"
          - assert:
              selector: "div"
              contains: "Total Admins"
          - assert:
              selector: "div"
              contains: "Default Accts"
          - assert:
              selector: "div"
              contains: "Weak Passwords"
          - assert:
              selector: "div"
              contains: "Stale Accts"

      - id: verify_table_and_filters
        action: ui
        description: "Verify device table columns and issue filter dropdown"
        playwright:
          - assert:
              selector: "table thead"
              contains: "Device"
          - assert:
              selector: "table thead"
              contains: "OS"
          - assert:
              selector: "table thead"
              contains: "Admins"
          - assert:
              selector: "table thead"
              contains: "Issues"
          - assert:
              selector: "select option[value='default_account']"
              visible: true
          - assert:
              selector: "select option[value='weak_password']"
              visible: true
          - assert:
              selector: "select option[value='stale_account']"
              visible: true

      - id: verify_search
        action: ui
        description: "Verify search input accepts text"
        playwright:
          - fill:
              "input[placeholder='Search devices or users...']": "admin"
          - waitFor:
              selector: "table tbody"
              timeout: 5000
          - fill:
              "input[placeholder='Search devices or users...']": ""

  - id: monitoring_dashboard
    name: "Monitoring Dashboard"
    description: "Verify application monitoring dashboard navigates and loads"
    tags: [monitoring, dashboard]
    nodes: [linux]
    timeout: 120000
    steps:
      - id: login
        action: ui
        description: "Login to Breeze dashboard"
        playwright:
          - goto: "/login"
          - fill:
              "[name='email']": "${TEST_USER_EMAIL}"
              "[name='password']": "${TEST_USER_PASSWORD}"
          - click: "button[type='submit']"
          - waitFor:
              url: "**/"
              timeout: 15000

      - id: navigate_monitoring
        action: ui
        description: "Navigate to Monitoring page"
        playwright:
          - goto: "/monitoring"
          - waitFor: "text=Monitor"
            timeout: 15000

      - id: check_system_metrics
        action: api
        description: "Verify system metrics collected by agent"
        request:
          method: GET
          path: "/api/v1/devices/{{devices.linux}}/diagnostic-logs"
          query:
            component: monitoring
            since: "{{testStartTime}}"
            search: "metrics"
        poll:
          maxAttempts: 10
          intervalMs: 3000
          until: "logs.length > 0"
        expect:
          offset: 0

