# Device Management E2E Tests
# Tests device lifecycle, list views, filters, detail navigation, and system tools.
# Covers: DevicesPage, DeviceList, DeviceDetails, DeviceCompare, DeviceGroupsPage.
#
# Table columns (DeviceList): Hostname, Organization, Site, OS, Status, CPU %, RAM %, Last Seen, Actions
# Status options: Online, Offline, Maintenance
# OS options: Windows, macOS, Linux
# Per-row action menu: Remote Terminal, Run Script, Reboot, Settings, Decommission
# Bulk actions: Reboot Selected, Run Script, Deploy Software, Enable Maintenance, Disable Maintenance, Decommission Selected

tests:
  - id: device_list_loads
    name: "Device List Loads with Correct Columns"
    description: "Verify the devices page loads and the list table shows expected column headers"
    tags: [devices, list, critical]
    nodes: [linux]
    timeout: 90000
    steps:
      - id: login
        action: ui
        description: "Login to Breeze dashboard"
        playwright:
          - goto: "/login"
          - waitFor: "text=Sign in"
            timeout: 10000
          - fill:
              "[name='email']": "${TEST_USER_EMAIL}"
              "[name='password']": "${TEST_USER_PASSWORD}"
          - click: "button[type='submit']"
          - waitFor:
              url: "**/"
              timeout: 15000

      - id: navigate_devices
        action: ui
        description: "Navigate to Devices page"
        playwright:
          - goto: "/devices"
          - waitFor: "text=Devices"
            timeout: 15000

      - id: verify_page_heading
        action: ui
        description: "Verify page heading and device count text"
        playwright:
          - assert:
              selector: "h1:has-text('Devices')"
              exists: true
          - assert:
              selector: "text=Manage and monitor your fleet"
              exists: true

      - id: verify_table_columns
        action: ui
        description: "Verify device list table column headers"
        playwright:
          - waitFor: "text=Hostname"
            timeout: 10000
          - assert:
              selector: "th:has-text('Hostname')"
              exists: true
          - assert:
              selector: "th:has-text('Organization')"
              exists: true
          - assert:
              selector: "th:has-text('Site')"
              exists: true
          - assert:
              selector: "th:has-text('OS')"
              exists: true
          - assert:
              selector: "th:has-text('Status')"
              exists: true
          - assert:
              selector: "th:has-text('CPU %')"
              exists: true
          - assert:
              selector: "th:has-text('RAM %')"
              exists: true
          - assert:
              selector: "th:has-text('Last Seen')"
              exists: true
          - assert:
              selector: "th:has-text('Actions')"
              exists: true

      - id: verify_view_controls
        action: ui
        description: "Verify list/grid view toggle and Add Device button exist"
        playwright:
          - assert:
              selector: "button[title='List view']"
              exists: true
          - assert:
              selector: "button[title='Grid view']"
              exists: true
          - assert:
              selector: "button:has-text('Add Device')"
              exists: true

