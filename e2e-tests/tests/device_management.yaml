          path: "/api/v1/devices/{{devices.windows}}/diagnostic-logs"
          query:
            component: system
            since: "{{testStartTime}}"
        poll:
          maxAttempts: 10
          intervalMs: 3000
          until: "logs.length > 0"
        expect:
