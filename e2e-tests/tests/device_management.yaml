  - id: device_heartbeat_monitoring
    name: "Device Heartbeat Monitoring"
    description: "Verify device heartbeat data is available via diagnostic logs API"
    tags: [devices, monitoring, heartbeat]
    nodes: [linux]
    timeout: 180000
    steps:
      - id: login
        action: ui
        description: "Login to Breeze dashboard"
        playwright:
          - goto: "/login"
          - fill:
              "[name='email']": "${TEST_USER_EMAIL}"
              "[name='password']": "${TEST_USER_PASSWORD}"
          - click: "button[type='submit']"
          - waitFor:
              url: "**/"
              timeout: 15000

      - id: check_heartbeat
        action: api
        description: "Verify agent heartbeat data via diagnostic logs"
        request:
          method: GET
          path: "/api/v1/devices/{{devices.linux}}/diagnostic-logs"
          query:
            component: heartbeat
            since: "{{testStartTime}}"
        poll:
          maxAttempts: 15
          intervalMs: 3000
          until: "logs.length > 0"
        expect:
          offset: 0

      - id: navigate_devices
        action: ui
        description: "Navigate to Devices page to verify UI is healthy"
        playwright:
          - goto: "/devices"
          - waitFor: "text=Devices"
            timeout: 10000

  - id: device_system_tools_windows
    name: "Device System Tools (Windows)"
    description: "Verify system tools data is available from a Windows agent"
    tags: [devices, system-tools]
