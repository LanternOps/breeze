# Device Detail Tabs E2E Tests
# Tests each individual tab in the DeviceDetails component (/devices/[id])
#
# Tab list (in order, from DeviceDetails.tsx):
#   Overview, Device Details, Hardware Inventory, Software Inventory, Patch Status,
#   Disk Cleanup, Security, Peripherals, Management, Effective Config,
#   Alert History, Script History, Performance, Boot Performance,
#   Event Log, Activities, Network Connections, IP History, Playbooks
#
# Overview tab shows: CPU %, RAM %, Last Seen, Uptime, Logged-in User stat cards
#   plus DevicePerformanceGraphs (compact) and DeviceAlertHistory (limit 4)
# Hardware Inventory tab: CPU model, RAM total, disk drives table, network adapters table
# Software Inventory tab: paginated table with Name, Version, Publisher, Install Date; search box
# Patch Status tab: compliance %, pending patches list with severity/category badges
# Security tab: threat records table, scan history table, AV status section
# Performance tab: time range buttons (24h, 7d, 30d), area/line charts for CPU/RAM/Disk
# Alert History tab: date range filter inputs, alerts table with severity badges
# Script History tab: script execution history table
# Network Connections tab: protocol/state filter dropdowns, connections table
# IP History tab: IP address history with assignment type badges, pagination

tests:
  - id: device_detail_overview_tab
    name: "Device Detail Overview Tab"
    description: "Verify the Overview tab shows all five metric stat cards and the performance graphs section"
    tags: [devices, detail, overview, critical]
    nodes: [linux]
    timeout: 120000
    steps:
      - id: login
        action: ui
        description: "Login to Breeze dashboard"
        playwright:
          - goto: "/login"
          - waitFor: "text=Sign in"
            timeout: 10000
          - fill:
              "[name='email']": "${TEST_USER_EMAIL}"
              "[name='password']": "${TEST_USER_PASSWORD}"
          - click: "button[type='submit']"
          - waitFor:
              url: "**/"
              timeout: 15000

      - id: navigate_to_device
        action: ui
        description: "Navigate to the Linux test device detail page"
        playwright:
          - goto: "/devices/{{devices.linux}}"
          - waitFor: "nav button:has-text('Overview')"
            timeout: 15000

      - id: verify_overview_is_active_by_default
        action: ui
        description: "Verify the Overview tab is active by default"
        playwright:
          - assert:
              selector: "nav button:has-text('Overview')"
              exists: true

      - id: verify_stat_cards
        action: ui
        description: "Verify all five stat cards are present on the Overview tab"
        playwright:
          - waitFor: "text=CPU"
            timeout: 10000
          - assert:
              selector: "text=CPU"
              exists: true
          - assert:
              selector: "text=RAM"
              exists: true
          - assert:
              selector: "text=Last Seen"
              exists: true
          - assert:
              selector: "text=Uptime"
              exists: true
          - assert:
              selector: "text=Logged-in User"
              exists: true

