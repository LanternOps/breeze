name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'apps/docs/**'
      - '**/*.md'
      - '**/*.mdx'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'apps/docs/**'
      - '**/*.md'
      - '**/*.mdx'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'
  GO_VERSION: '1.24'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check migration coverage
        run: ./scripts/check-migration-coverage.sh

      - name: Check schema drift (column-level)
        run: pnpm check:schema-drift

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        run: pnpm exec tsc --noEmit --project apps/api/tsconfig.json

      - name: Run Astro check
        working-directory: apps/web
        run: pnpm exec astro check

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm test --filter=@breeze/api

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Web tests
        run: pnpm test --filter=@breeze/web

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm build --filter=@breeze/api

      - name: Upload API artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 7

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm build --filter=@breeze/web

      - name: Upload Web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  build-agent:
    name: Build Agent (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
            cgo: '0'
          - goos: darwin
            goarch: amd64
            suffix: ''
            cgo: '0'
          - goos: darwin
            goarch: arm64
            suffix: ''
            cgo: '0'
          - goos: windows
            goarch: amd64
            suffix: '.exe'
            cgo: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        run: go mod download

      - name: Build Agent
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          BUILD_VERSION: ${{ github.sha }}
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION}" \
            -o "breeze-agent-${GOOS}-${GOARCH}${{ matrix.suffix }}" \
            ./cmd/breeze-agent

      - name: Upload Agent artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/breeze-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 7

  test-agent:
    name: Test Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        run: go mod download

      - name: Run Go tests
        working-directory: agent
        run: CGO_ENABLED=0 go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: agent-coverage
          path: agent/coverage.out
          retention-days: 7

  # ─── Smoke Test ───────────────────────────────────────────────────────
  # Builds Docker images, starts the full stack, and verifies:
  #   1. DB + Redis connectivity (health/ready)
  #   2. Login + JWT issuance
  #   3. Authenticated API endpoints (exercises core DB tables)
  #   4. Web page loads (SSR rendering works)
  # Non-blocking on PRs (continue-on-error), required on main pushes.
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=smoketest
          JWT_SECRET=ci-smoke-k7x9Qm4pR2vL8nW5jT3yF6hB0cA1dE4gI7
          AGENT_ENROLLMENT_SECRET=ci-smoke-enrollment-secret
          APP_ENCRYPTION_KEY=ci-smoke-Xz9Lm3Kp7Wn2Qr5Tv8Yb0Hd4Fg6Jc1Ae3
          MFA_ENCRYPTION_KEY=ci-smoke-Nm4Rp8Ws2Kv6Tq0Yh3Bd7Fg1Jc5Le9Ax2
          BREEZE_DOMAIN=localhost
          ACME_EMAIL=ci@breeze.local
          TURN_SECRET=ci-smoke-turn-secret
          TURN_HOST=127.0.0.1
          TRUST_PROXY_HEADERS=false
          EOF

      - name: Build and start containers
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml.ci up --build -d

      - name: Wait for API ready (DB + Redis)
        run: |
          echo "Waiting for API readiness (DB + Redis)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3001/health/ready 2>/dev/null; do sleep 2; done'
          curl -s http://localhost:3001/health/ready | jq .
          echo "API is ready."

      - name: Wait for Web health
        run: |
          echo "Waiting for Web on :4321..."
          timeout 120 bash -c 'until curl -sf http://localhost:4321/ 2>/dev/null; do sleep 2; done'
          echo "Web is healthy."

      - name: Login and export token
        id: login
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3001/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"admin@breeze.local","password":"BreezeAdmin123!"}')
          echo "Login response: ${RESPONSE}"
          TOKEN=$(echo "${RESPONSE}" | jq -r '.tokens.accessToken // .token // .accessToken // empty')
          if [ -z "${TOKEN}" ]; then
            echo "Login failed — no token in response"
            exit 1
          fi
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"
          echo "Login successful."

      - name: Smoke test API endpoints
        env:
          TOKEN: ${{ steps.login.outputs.token }}
          API: http://localhost:3001/api/v1
        run: |
          FAIL=0
          PASS_COUNT=0
          FAIL_COUNT=0
          smoke() {
            local name=$1 url=$2 expected_status=${3:-200}
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${TOKEN}" "${url}")
            if [ "${STATUS}" = "${expected_status}" ]; then
              echo "  PASS  ${name} (${STATUS})"
              PASS_COUNT=$((PASS_COUNT + 1))
            else
              echo "  FAIL  ${name} — expected ${expected_status}, got ${STATUS}"
              FAIL=1
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          }

          echo "=== API Endpoint Smoke Tests ==="

          # ── Devices & Hardware ──
          smoke "GET /devices"                  "${API}/devices"
          smoke "GET /device-groups"            "${API}/device-groups"
          smoke "GET /tags"                     "${API}/tags"
          smoke "GET /custom-fields"            "${API}/custom-fields"
          smoke "GET /filters"                  "${API}/filters"

          # ── Monitoring & Alerts ──
          smoke "GET /alerts"                   "${API}/alerts"
          smoke "GET /alert-templates"          "${API}/alert-templates"
          smoke "GET /monitors"                 "${API}/monitors"
          smoke "GET /monitoring"               "${API}/monitoring"
          smoke "GET /snmp"                     "${API}/snmp"

          # ── Organizations & Users ──
          smoke "GET /orgs"                     "${API}/orgs"
          smoke "GET /users"                    "${API}/users"
          smoke "GET /roles"                    "${API}/roles"
          smoke "GET /api-keys"                 "${API}/api-keys"
          smoke "GET /enrollment-keys"          "${API}/enrollment-keys"

          # ── Scripts & Automation ──
          smoke "GET /scripts"                  "${API}/scripts"
          smoke "GET /script-library"           "${API}/script-library"
          smoke "GET /automations"              "${API}/automations"
          smoke "GET /playbooks"                "${API}/playbooks"

          # ── Patching & Policies ──
          smoke "GET /patches"                  "${API}/patches"
          smoke "GET /patch-policies"           "${API}/patch-policies"
          smoke "GET /update-rings"             "${API}/update-rings"
          smoke "GET /policies"                 "${API}/policies"
          smoke "GET /configuration-policies"   "${API}/configuration-policies"

          # ── Software & Inventory ──
          smoke "GET /software"                 "${API}/software"
          smoke "GET /software-policies"        "${API}/software-policies"
          smoke "GET /software-inventory"       "${API}/software-inventory"

          # ── Security & Compliance ──
          smoke "GET /security"                 "${API}/security"
          smoke "GET /cis"                      "${API}/cis"
          smoke "GET /audit-logs"               "${API}/audit-logs"
          smoke "GET /audit-baselines"          "${API}/audit-baselines"
          smoke "GET /access-reviews"           "${API}/access-reviews"
          smoke "GET /sensitive-data"           "${API}/sensitive-data"
          smoke "GET /browser-security"         "${API}/browser-security"
          smoke "GET /dns-security"             "${API}/dns-security"
          smoke "GET /user-risk"                "${API}/user-risk"
          smoke "GET /reliability"              "${API}/reliability"
          smoke "GET /peripherals"              "${API}/peripherals"

          # ── Network & Discovery ──
          smoke "GET /discovery"                "${API}/discovery"
          smoke "GET /network/baselines"        "${API}/network/baselines"
          smoke "GET /network/changes"          "${API}/network/changes"

          # ── Deployment & Agents ──
          smoke "GET /deployments"              "${API}/deployments"
          smoke "GET /agent-versions"           "${API}/agent-versions"
          smoke "GET /viewers"                  "${API}/viewers"

          # ── Integrations & Webhooks ──
          smoke "GET /integrations"             "${API}/integrations"
          smoke "GET /webhooks"                 "${API}/webhooks"

          # ── Reports & Notifications ──
          smoke "GET /reports"                  "${API}/reports"
          smoke "GET /notifications"            "${API}/notifications"
          smoke "GET /changes"                  "${API}/changes"

          # ── System & Maintenance ──
          smoke "GET /maintenance"              "${API}/maintenance"
          smoke "GET /plugins"                  "${API}/plugins"
          smoke "GET /analytics"                "${API}/analytics"

          echo ""
          echo "Results: ${PASS_COUNT} passed, ${FAIL_COUNT} failed"
          if [ "${FAIL}" -ne 0 ]; then
            echo "One or more API smoke tests failed"
            exit 1
          fi
          echo "All API smoke tests passed."

      - name: Smoke test web pages
        run: |
          FAIL=0
          smoke_page() {
            local name=$1 path=$2
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:4321${path}")
            if [ "${STATUS}" = "200" ]; then
              echo "  PASS  ${name} (${STATUS})"
            else
              echo "  FAIL  ${name} — expected 200, got ${STATUS}"
              FAIL=1
            fi
          }

          echo "=== Web Page Smoke Tests ==="

          smoke_page "Dashboard"     "/"
          smoke_page "Login"         "/login"
          smoke_page "Devices"       "/devices"
          smoke_page "Alerts"        "/alerts"
          smoke_page "Scripts"       "/scripts"
          smoke_page "Automations"   "/automations"
          smoke_page "Patches"       "/patches"
          smoke_page "Policies"      "/policies"
          smoke_page "Discovery"     "/discovery"
          smoke_page "Reports"       "/reports"
          smoke_page "Settings"      "/settings"

          if [ "${FAIL}" -ne 0 ]; then
            echo "One or more page smoke tests failed"
            exit 1
          fi
          echo "All page smoke tests passed."

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://breeze:smoketest@localhost:5432/breeze
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-smoke-k7x9Qm4pR2vL8nW5jT3yF6hB0cA1dE4gI7
          APP_ENCRYPTION_KEY: ci-smoke-Xz9Lm3Kp7Wn2Qr5Tv8Yb0Hd4Fg6Jc1Ae3
          MFA_ENCRYPTION_KEY: ci-smoke-Nm4Rp8Ws2Kv6Tq0Yh3Bd7Fg1Jc5Le9Ax2
          NODE_ENV: test
        run: pnpm --filter=@breeze/api test:integration

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml.ci logs --tail=200

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml.ci down -v

  # Summary job that depends on all other jobs for branch protection
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-api, test-web, build-api, build-web, build-agent, test-agent, smoke-test]
    if: always()
    steps:
      - name: Check all jobs passed
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_API_RESULT: ${{ needs.test-api.result }}
          TEST_WEB_RESULT: ${{ needs.test-web.result }}
          BUILD_API_RESULT: ${{ needs.build-api.result }}
          BUILD_WEB_RESULT: ${{ needs.build-web.result }}
          BUILD_AGENT_RESULT: ${{ needs.build-agent.result }}
          TEST_AGENT_RESULT: ${{ needs.test-agent.result }}
          SMOKE_TEST_RESULT: ${{ needs.smoke-test.result }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          if [[ "${LINT_RESULT}" != "success" ]] || \
             [[ "${TYPECHECK_RESULT}" != "success" ]] || \
             [[ "${TEST_API_RESULT}" != "success" ]] || \
             [[ "${TEST_WEB_RESULT}" != "success" ]] || \
             [[ "${BUILD_API_RESULT}" != "success" ]] || \
             [[ "${BUILD_WEB_RESULT}" != "success" ]] || \
             [[ "${BUILD_AGENT_RESULT}" != "success" ]] || \
             [[ "${TEST_AGENT_RESULT}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          # Smoke test: non-blocking on PRs, required on main
          if [[ "${IS_PR}" != "true" ]] && [[ "${SMOKE_TEST_RESULT}" != "success" ]]; then
            echo "Smoke test failed on main branch push"
            exit 1
          fi
          echo "All required jobs passed!"
